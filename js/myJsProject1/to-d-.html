<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TO DO</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        body{
            text-align: center;
        }
        #maintask{
            font-weight: 900;
            font-size: 20pt;
        }
        h1{
            font-weight: 900;
        }
    </style>
</head>
<body>
    <h1 class="m-5">TO-DO LIST</h1>
    <div class="row justify-content-center">
        <label for="Task" class="col-3 m-3" id="maintask">TASK: </label>
        <input type="text" id="task" name="task" placeholder="Enter New Task" class="col-6 m-3">
        <button id="addTask" class="btn-primary col-3 m-3 my-3">Add</button>
    </div>
    <div>
        <form id="list"></form>
    </div>

    <button class="btn-secondary col-3 m-2 my-3" id="save">Save</button>
    <div>
        <form id="savedList"></form>
    </div>


    <script>
        const taskInput = document.getElementById("task");
        const list = document.getElementById("list");
        const btnAdd = document.getElementById("addTask");

        

        function addList() {
            const task = taskInput.value.trim(); 

            if (task !== "") {
                const newItem = document.createElement("div");
                newItem.className = "form-check text-start mx-auto m-3";
                newItem.style.maxWidth = "500px";

                const checkbox = document.createElement("input");
                checkbox.type = "checkbox";
                checkbox.className = "form-check-input";
                checkbox.id = `task-${Date.now()}`;

                const label = document.createElement("label");
                label.className = "form-check-label";
                label.htmlFor = checkbox.id;
                label.textContent = task;

                newItem.appendChild(checkbox);
                newItem.appendChild(label);
                list.appendChild(newItem);
                taskInput.value = "";
            }
        }

        const btnSave = document.getElementById("save"); 
        const saveList = document.getElementById("savedList"); 

        function saveListInDiv(){
            const children = list.childNodes; //returns a nodelist of all the childern elements and 
            // console.log(children);
            
            //session storage ya local storage use krni hai
            for(node of children){
                const newDiv = document.createElement("div"); 
                newDiv.type = ; 
                const content = node.innerText; 
                console.log(content); 
                newDiv.textContent = content; 
                saveList.appendChild(newDiv);
                
            }

        }

        btnAdd.addEventListener("click", addList);
        btnAdd.addEventListener("keydown", (event)=>{
            if(event.key === "ENTER"){
                addList(); 
            }
        })
        btnSave.addEventListener("click", saveList);
        // console.log(list.childNodes);  


    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
</body>
</html>
