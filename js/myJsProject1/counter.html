<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-EVSTQN3/azprG1Anm3QDgpJLIm9Nao0Yz1ztcQTwFspd3yD65VohhpuuCOmLASjC" crossorigin="anonymous">
    <style>
        body{
            font-size: 20pt;
        }
        h2{
            font-size: 50pt;
        }
        .counter{
            text-align: center;
        }
    </style>
</head>
<body>
    <div class="row counter">
        <div class="col-6 justify-content-center p-3 mr-4 ml-4"></div>
        <h2 id="count">0</h2>
        <button id="increaseCount">+</button>
        <button id="decreaseCount">-</button>
        <button id="resetCount">Reset</button>
        <button id="saveCount">Save</button>
        <button id="loadCount">Load</button>
    </div>

    <script>
        const countElement = document.getElementById("count");
        let count = 0;
        let savedCount = null;

        function updateCount() {
            countElement.textContent = count;
        }

        function increaseCount() {
            count++;
            updateCount();
        }

        function decreaseCount() {
            if (count > 0) {
                count--;
                updateCount();
            } else {
co            }
        }

        function resetCount() {
            count = 0;
            updateCount();
        }

        function saveCount() {
            savedCount = count;
            window.alert(`Current count saved: ${savedCount}`);
        }

        function loadCount() {
            if (savedCount !== null) {
                count = savedCount;
                updateCount();
            } else {
                window.alert("No saved count to load");
            }
        }

        document.getElementById("increaseCount").addEventListener("click", increaseCount);
        document.getElementById("decreaseCount").addEventListener("click", decreaseCount);
        document.getElementById("resetCount").addEventListener("click", resetCount);
        document.getElementById("saveCount").addEventListener("click", saveCount);
        document.getElementById("loadCount").addEventListener("click", loadCount);
    </script>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/js/bootstrap.bundle.min.js" integrity="sha384-MrcW6ZMFYlzcLA8Nl+NtUVF0sA7MsXsP1UyJoMp4YLEuNSfAP+JcXn/tWtIaxVXM" crossorigin="anonymous"></script>
    
</body>
</html>
