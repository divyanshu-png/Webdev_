<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Currency Converter</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .container1{
            display: flex;
            flex-direction: row;
            float: right;
            justify-content: flex-end;
        }
        .box{
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            ;
        }
        .output-box{
            border: 2px solid grey; 
            padding: 2px;
            margin: 2px;
        }
    </style>

</head>
<body>
    <div class="container-fluid box">
        <div class="col-12">
            <h2 class="m-4 text-center" style="font-weight: 900; font-size: 4rem;">Currency Exchanger</h2>
        </div>
        
        <div class="row m-3">
            <div class="col-5 g-4 justify-content-center container1">
                <form>
                    <label for="enteredValue">Enter amount</label>
                    <input class="col-4" value="100" id="enteredValue">
                    <select id="options1" aria-placeholder="Choose">
                        <option value="INR">INR</option>
                        <option value="USD">USD</option>
                        <option value="RUB">RUB</option>
                        <option value="YEN">YEN</option>
                        <option value="EUR">EUR</option>
                    </select>
                </form>
            </div>
            <div class="col-1 mt-4 justify-content-center">
                <svg xmlns="http://www.w3.org/2000/svg" width="30" height="30" fill="currentColor" class="bi bi-currency-exchange" viewBox="0 0 16 16" id="svgCurrency">
                <path d="M0 5a5 5 0 0 0 4.027 4.905 6.5 6.5 0 0 1 .544-2.073C3.695 7.536 3.132 6.864 3 5.91h-.5v-.426h.466V5.05q-.001-.07.004-.135H2.5v-.427h.511C3.236 3.24 4.213 2.5 5.681 2.5c.316 0 .59.031.819.085v.733a3.5 3.5 0 0 0-.815-.082c-.919 0-1.538.466-1.734 1.252h1.917v.427h-1.98q-.004.07-.003.147v.422h1.983v.427H3.93c.118.602.468 1.03 1.005 1.229a6.5 6.5 0 0 1 4.97-3.113A5.002 5.002 0 0 0 0 5m16 5.5a5.5 5.5 0 1 1-11 0 5.5 5.5 0 0 1 11 0m-7.75 1.322c.069.835.746 1.485 1.964 1.562V14h.54v-.62c1.259-.086 1.996-.74 1.996-1.69 0-.865-.563-1.31-1.57-1.54l-.426-.1V8.374c.54.06.884.347.966.745h.948c-.07-.804-.779-1.433-1.914-1.502V7h-.54v.629c-1.076.103-1.808.732-1.808 1.622 0 .787.544 1.288 1.45 1.493l.358.085v1.78c-.554-.08-.92-.376-1.003-.787zm1.96-1.895c-.532-.12-.82-.364-.82-.732 0-.41.311-.719.824-.809v1.54h-.005zm.622 1.044c.645.145.943.38.943.796 0 .474-.37.8-1.02.86v-1.674z"/>
            </svg>
            </div>

            <div class="col-6 g-4">
                <form>
                    <label for="convertedValue">Converted Value to </label>
                    <select id="options2">
                        <option value="INR">INR</option>
                        <option value="USD">USD</option>
                        <option value="RUB">RUB</option>
                        <option value="YEN">YEN</option>
                        <option value="EUR">EUR</option>
                    </select>
                    <output name="result" class="output-box">Converted Value is: </output>
                </form>
            </div>
        </div>
        <div class="row">
            <button class="btn-primary">Convert</button>
        </div>
        <div class="row m-3 g-3">
            <p class="rate-text">Current Currency Exchange Rate as of : </p>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
    <script src="./CURRENCY_converter.js" defer></script>
</body>
</html>
