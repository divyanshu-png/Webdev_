<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mondrian Project</title>
  <style>
    /* 
    Write your CSS here 
    Gap Colour: #000
    White: #F0F1EC
    Red: #E72F24
    Black: #232629
    Blue: #004592
    Yellow: #F9D01E

    For dimensions, see dimensions.png image.
    HINT: Remember you can't change the properties of grid lines.
    But grid lines are transparent!
    */
    body{
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
      margin: 0px;
      padding: 0px;
    }
    .container{
      display: grid;
      width: 748px; 
      height: 748px;
      grid-template-columns: 320px 198px 153px 50px;
      grid-template-rows: 414px 130px 155px 22px ;
      gap: 9px;
      background-color: #000;
    }
    .red{
      background-color: #E72F24;
      order: 0;
      height: 414px;
      width: 320px;
    }
    .white{
      background-color: #F0F1EC;
    }

    .black{
      background-color: #232629;
      order: 8;
    }
    .yellow{ 
      background-color: #F9D01E;
      order:6
    }
    .blue{ 
      background-color: #004592;
      order: 4;
      border-bottom: 10px solid #000;
    }
    .first{
      order: 1; 
      height: 414px;
      grid-column: span 3;
    }
    .second{
      order: 2 ;
      grid-row: span 2; 
    }
    .third{
      order: 3;
      grid-row: span 2;
      grid-column: span 2;
    }
    .fourth{
      order: 5;
      grid-row: span 2 ;
    }
    .fifth{
      order: 6;
    }

  </style>
</head>

<body>
  <div class="container">
    <div class="red"></div>
    <div class="white first"></div>
    <div class="white second"></div>
    <div class="white third"></div>
    <div class="blue"></div>
    <div class="white fourth"></div>
    <div class="white fifth"></div>
    <div class="yellow "></div>
    <div class="black"></div>
  </div>
</body>

</html>
